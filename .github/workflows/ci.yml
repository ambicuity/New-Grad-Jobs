name: CI — Lint & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'config.yml'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/**'

permissions: read-all
jobs:
  lint-and-validate:
    name: Python Lint & Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check — update_jobs.py
        run: python -m py_compile scripts/update_jobs.py

      - name: Syntax check — generate_companies.py
        run: python -m py_compile scripts/generate_companies.py

      - name: Syntax check — scripts/validate_config.py
        run: python -m py_compile scripts/validate_config.py

      - name: Syntax check — fix_nan_only.py
        run: python -m py_compile scripts/fix_nan_only.py

      - name: Flake8 lint (errors only, E9/F-class)
        run: |
          # Stop on syntax errors and undefined names only.
          # Style warnings (E501 long lines, W503, etc.) are informational.
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate config.yml structure
        run: |
          python - <<'EOF'
          import yaml, sys
          with open("config.yml") as f:
              config = yaml.safe_load(f)
          required_keys = ["filtering", "apis", "readme"]
          for key in required_keys:
              if key not in config:
                  print(f"ERROR: Missing required top-level key in config.yml: '{key}'")
                  sys.exit(1)
          print(f"✅ config.yml is valid YAML with all required keys.")
          # Read nested company lists directly so a missing or malformed
          # apis.greenhouse.companies / apis.lever.companies schema fails loudly
          # instead of silently reporting zero companies.
          try:
              apis = config["apis"]
              greenhouse = apis["greenhouse"]["companies"]
              lever = apis["lever"]["companies"]
          except (KeyError, TypeError):
              print("ERROR: Invalid nested API schema in config.yml "
                    "(expected apis.greenhouse.companies and apis.lever.companies)")
              sys.exit(1)
          if not isinstance(greenhouse, list) or not isinstance(lever, list):
              print("ERROR: apis.greenhouse.companies and apis.lever.companies must be lists")
              sys.exit(1)
          print(f"   Greenhouse companies: {len(greenhouse)}")
          print(f"   Lever companies: {len(lever)}")
          EOF

      - name: Run unit tests
        run: python scripts/validate_config.py

      - name: Check for duplicate API URLs in config.yml
        run: |
          python - <<'EOF'
          import yaml, sys
          with open("config.yml") as f:
              config = yaml.safe_load(f)
          urls = []
          for section in ['greenhouse', 'lever', 'workday']:
              companies = config.get('apis', config).get(section, {}).get('companies', [])
              for c in companies:
                  url = c.get('url', c.get('workday_url', ''))
                  if url:
                      urls.append((section, c.get('name', ''), url))
          seen = {}
          duplicates = []
          for section, name, url in urls:
              if url in seen:
                  duplicates.append(f"  DUPLICATE: {url} ({name} in {section}) already defined as {seen[url]}")
              else:
                  seen[url] = f"{name} in {section}"
          if duplicates:
              print("❌ Duplicate API URLs found in config.yml:")
              for d in duplicates:
                  print(d)
              sys.exit(1)
          print(f"✅ No duplicate URLs found across {len(urls)} entries.")
          EOF

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: pytest tests/ -v --cov=scripts --cov-report=term-missing --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && env.HAS_CODECOV_TOKEN == 'true' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: coverage-report
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.HAS_CODECOV_TOKEN == 'true' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
