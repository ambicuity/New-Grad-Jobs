name: Update New Grad Jobs

on:
  # Run every 5 minutes
  schedule:
    - cron: '*/5 * * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Only run on push when scraper inputs/config change.
  # This avoids self-trigger loops from workflow commits to generated docs files on main.
  push:
    branches: [main]
    paths:
      - scripts/update_jobs.py
      - config.yml
      - requirements.txt

# Prevent concurrent executions of the same workflow
concurrency:
  group: update-jobs
  cancel-in-progress: true

permissions:
  contents: read
jobs:
  update-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run job scraper
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd scripts
          python update_jobs.py

      - name: Sanity check — verify job output is non-empty
        run: |
          JOB_COUNT=$(python -c "import json; data=json.load(open('docs/jobs.json')); print(data['meta']['total_jobs'])")
          echo "Job count: $JOB_COUNT"
          if [ "$JOB_COUNT" -eq 0 ]; then
            echo "::error::Sanity check failed: jobs.json contains 0 jobs. Aborting commit."
            exit 1
          fi

      - name: Publish prediction generation summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          status_path = Path("docs/predictions-status.json")
          prediction_path = Path("docs/predictions.json")
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          ref = os.environ.get("GITHUB_REF", "")

          lines = [
              "## Prediction artifact status",
              f"- Workflow run: [View run]({run_url})",
              f"- Ref: `{ref}`",
              f"- `docs/predictions.json` present: `{prediction_path.exists()}`",
          ]

          if status_path.exists():
              try:
                  status = json.loads(status_path.read_text(encoding="utf-8"))
                  state = status.get("state", "unknown")
                  message = status.get("message", "")
                  lines.append(f"- `docs/predictions-status.json` state: `{state}`")
                  if message:
                      lines.append(f"- Status message: {message}")
              except Exception as exc:
                  lines.append(f"- Failed to parse `docs/predictions-status.json`: `{exc}`")
          else:
              lines.append("- `docs/predictions-status.json` was not produced in this run.")

          if ref != "refs/heads/main":
              lines.append("- Non-main dispatch mode: commit/push is skipped by design.")
              lines.append("- Prediction verification artifacts are uploaded for this run.")

          with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Skip commit/push outside main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "artifact verification run; commit/push skipped by design."

      - name: Upload prediction verification artifacts (non-main)
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: prediction-verification-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            docs/predictions-status.json
            docs/predictions.json
            docs/market-history.json
            docs/jobs.json
            docs/health.json

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull-rebase BEFORE staging, using autostash because the scraper
          # just modified the files in the working directory (making it dirty).
          git config pull.rebase true
          git pull origin main --autostash

          git add docs/jobs.json docs/market-history.json docs/health.json docs/feed.xml
          if [ -f "docs/predictions.json" ]; then
            git add docs/predictions.json
          fi
          if [ -f "docs/predictions-status.json" ]; then
            git add docs/predictions-status.json
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🤖 Update job listings [skip ci]"

          # Push-only retry loop (rebase already done above).
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push rejected on attempt ${attempt} (concurrent write race), retrying..."
            # Another concurrent scraper may have pushed; fast-forward and retry.
            git fetch origin main
            git rebase origin/main
            sleep 5
          done
          echo "::error::Failed to push updated job listings after 3 attempts."
          exit 1
