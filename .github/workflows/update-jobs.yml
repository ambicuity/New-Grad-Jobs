name: Update New Grad Jobs

on:
  # Run every 5 minutes
  schedule:
    - cron: '*/5 * * * *'

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main branch for testing
  push:
    branches: [main]

# Prevent concurrent executions of the same workflow
concurrency:
  group: update-jobs
  cancel-in-progress: true

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch full history for proper rebasing

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run job scraper
      run: |
        cd scripts
        python update_jobs.py

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit and Create Pull Request
      if: steps.changes.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "🤖 Update job listings"
        title: "fix(scraper): 🤖 Update job listings"
        body: |
          Automated job aggregation update.

          Fixes #98
        branch: "chore/auto-update-jobs"
        branch-suffix: "timestamp"
        delete-branch: true
        labels: "automated-pr, auto-merge"

    - name: No changes
      if: steps.changes.outputs.changed == 'false'
      run: echo "No new jobs found, README unchanged"
