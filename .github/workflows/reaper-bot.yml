name: Issue Ops - Reaper Bot

on:
  schedule:
    # Run at midnight UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering for testing

permissions:
  issues: write

jobs:
  prune-ghosts:
    name: Unassign Stale Issues
    runs-on: ubuntu-latest
    steps:
      - name: Scan and Unassign
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const DAYS_TO_STALE = 7;
            const now = new Date();
            
            console.log(`Scanning for issues untouched in ${DAYS_TO_STALE} days...`);

            // 1. Get all OPEN issues that have ASSIGNEES and the 'in-progress' label
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'status: in-progress',
              per_page: 100
            });

            for (const issue of issues) {
              // Skip Pull Requests (they share the issues API)
              if (issue.pull_request) continue;
              // Skip issues with no assignees
              if (!issue.assignees || issue.assignees.length === 0) continue;

              const updatedAt = new Date(issue.updated_at);
              const diffTime = Math.abs(now - updatedAt);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

              if (diffDays > DAYS_TO_STALE) {
                const assignees = issue.assignees.map(a => a.login);
                console.log(`Issue #${issue.number} is stale (${diffDays} days). Unassigning: ${assignees.join(', ')}`);

                // 2. Remove the assignees
                await github.rest.issues.removeAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: assignees
                });

                // 3. Remove the in-progress label
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name: 'status: in-progress'
                  });
                } catch (e) {
                  console.log(`Could not remove label from #${issue.number}. It may have already been removed.`);
                }

                // 4. Leave a polite "Reaper" comment
                const reaperMessage = `🔔 **Reaper Bot:** This issue has had no activity for ${DAYS_TO_STALE} days.\n\n` +
                  `To ensure the project keeps moving, we have automatically unassigned the current contributors and removed the \`status: in-progress\` label so someone else can claim it.\n\n` +
                  `*If you are still working on this, please just comment \`/assign\` again to reclaim it!*`;

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: reaperMessage
                });
              } else {
                console.log(`Issue #${issue.number} is active (updated ${diffDays} days ago).`);
              }
            }
