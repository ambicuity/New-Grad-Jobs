name: CodeRabbit Plan Trigger

# When anyone adds the `plan-me` label to an issue, this workflow posts a
# comment that summons CodeRabbit to analyze the codebase and generate a
# step-by-step implementation plan as a reply on the issue.
# Contributors then hand that plan to Copilot, Cursor, or implement it manually.

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  trigger-plan:
    name: Trigger CodeRabbit Implementation Plan
    runs-on: ubuntu-latest
    if: github.event.label.name == 'plan-me'
    steps:
      - name: Post CodeRabbit plan request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueUrl = issue.html_url;

            // Check if we already posted a plan request (avoid duplicate triggers)
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: issueNumber
            });
            const alreadyTriggered = comments.data.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('@coderabbitai')
            );
            if (alreadyTriggered) {
              console.log('CodeRabbit plan already triggered for this issue. Skipping.');
              return;
            }

            const body = [
              '## Implementation Plan Request',
              '',
              'The `plan-me` label was added to this issue.',
              '@coderabbitai please analyze the repository and generate a detailed,',
              'step-by-step implementation plan for this issue.',
              '',
              '**CodeRabbit will:**',
              '- Review the issue description',
              '- Identify the relevant files and functions in `scripts/update_jobs.py`, `config.yml`, `docs/`, and `tests/`',
              '- Generate a concrete, file-level implementation plan',
              '- Flag any edge cases or risks (None/NaN handling, thread safety, pagination)',
              '',
              '> Contributors: wait for the plan before writing any code.',
              '> Once the plan is posted, comment `/assign` to claim this issue.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body
            });

            console.log(`Posted CodeRabbit plan trigger on issue #${issueNumber}`);
