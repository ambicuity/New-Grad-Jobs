name: Evaluate Jobs Sidecar

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: evaluate-jobs-sidecar
  cancel-in-progress: true

permissions: read-all

jobs:
  evaluate-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation sidecar (non-gating)
        id: sidecar
        continue-on-error: true
        run: |
          python scripts/evaluate_jobs.py

      - name: Integrity check (non-gating)
        if: steps.sidecar.outcome == 'success'
        run: |
          python scripts/check_integrity.py

      - name: Publish sidecar summary
        run: |
          echo "## Sidecar evaluation status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: ${{ steps.sidecar.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.sidecar.outcome }}" != "success" ]; then
            echo "- Sidecar failed; deterministic pipeline remains unaffected." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push evaluations
        if: steps.sidecar.outcome == 'success' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --autostash
          git add docs/job-evaluations.json
          if git diff --cached --quiet; then
            echo "No evaluation changes to commit"
            exit 0
          fi
          git commit -m "🤖 Update job evaluations [skip ci]"
          git push origin HEAD:main
