name: Auto-Thank & Credit on Merge

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  thank-and-credit:
    name: Thank & Credit Contributor
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip bot PRs (dependabot, renovate, etc.)
            if (author.includes('[bot]') || author === 'dependabot[bot]') {
              console.log(`Skipping bot PR by ${author}`);
              return;
            }

            // --- Step 1: Thank-you message ---

            // Check if this is the contributor's first merged PR
            const { data: prs } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} author:${author} type:pr is:merged`,
            });

            const isFirstMerge = prs.total_count <= 1;

            let thankMessage;
            if (isFirstMerge) {
              thankMessage = `🎉 **Congratulations on your first merged PR, @${author}!** 🎉\n\n` +
                `Welcome to the contributors of New Grad Jobs! Your change is now live and helping thousands of new graduates find their first tech job.\n\n` +
                `We'll add you to our [Contributors Hall of Fame](CONTRIBUTORS.md) automatically shortly. Thank you for making this project better! 🙏`;
            } else {
              thankMessage = `✅ Merged! Thanks again, @${author}. Your contribution is live. 🚀`;
            }

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: pr.number,
              body: thankMessage
            });

            // --- Step 2: Auto-detect contribution type ---

            // 2a. Detect from changed file paths (paginated to handle large PRs)
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const types = new Set();
            const imageExts = ['.png', '.jpg', '.jpeg', '.gif', '.svg', '.webp', '.ico', '.figma'];

            for (const file of files) {
              const f = file.filename;
              const lower = f.toLowerCase();

              // Code — source files
              if (lower.endsWith('.py') || lower.endsWith('.js') || lower.endsWith('.ts') ||
                  lower.endsWith('.jsx') || lower.endsWith('.tsx') || lower.endsWith('.sh') ||
                  f.startsWith('scripts/')) {
                types.add('code');
              }

              // Test — test files
              if (f.startsWith('tests/') || f.startsWith('test_') || lower.includes('_test.') ||
                  lower.includes('.test.') || lower.includes('spec.')) {
                types.add('test');
              }

              // Documentation — markdown and docs
              if ((lower.endsWith('.md') || lower.endsWith('.rst') || lower.endsWith('.txt') ||
                   f.startsWith('docs/')) && f !== 'README.md') {
                types.add('doc');
              }

              // Infrastructure — CI/CD, workflows, build config
              if (f.startsWith('.github/workflows/') || f.startsWith('.github/actions/') ||
                  lower === 'dockerfile' || lower === 'docker-compose.yml' ||
                  lower.endsWith('.dockerfile') || lower === 'makefile') {
                types.add('infra');
              }

              // Design — CSS, HTML, images, UI assets
              if (lower.endsWith('.css') || lower.endsWith('.scss') || lower.endsWith('.sass') ||
                  lower.endsWith('.html') || f.startsWith('assets/') || f.startsWith('static/') ||
                  f.startsWith('images/') || imageExts.some(ext => lower.endsWith(ext))) {
                types.add('design');
              }

              // Maintenance — config, dependencies, tooling
              if (lower === '.gitignore' || lower === '.editorconfig' || lower === '.prettierrc' ||
                  lower === 'pyproject.toml' || lower === 'setup.cfg' || lower === 'setup.py' ||
                  lower === 'requirements.txt' || lower === 'package.json' ||
                  lower === 'package-lock.json' || lower === '.pre-commit-config.yaml' ||
                  lower === '.all-contributorsrc' || lower === '.flake8') {
                types.add('maintenance');
              }

              // Config (maps to code — config.yml drives scraping behavior)
              if (lower === 'config.yml' || lower === 'config.yaml') {
                types.add('code');
              }
            }

            // 2b. Detect from PR labels
            const labelNames = (pr.labels || []).map(l => l.name.toLowerCase());

            if (labelNames.some(l => l.includes('bug') || l.includes('fix'))) {
              types.add('bug');
            }
            if (labelNames.some(l => l.includes('security') || l.includes('vulnerability'))) {
              types.add('security');
            }
            if (labelNames.some(l => l.includes('enhancement') || l.includes('feature') || l.includes('idea'))) {
              types.add('ideas');
            }
            if (labelNames.some(l => l.includes('documentation') || l.includes('docs'))) {
              types.add('doc');
            }

            // Default to 'code' if nothing matched
            if (types.size === 0) {
              types.add('code');
            }

            const contributionTypes = [...types].join(', ');

            // --- Step 3: Post all-contributors command ---

            const creditMessage = `@all-contributors please add @${author} for ${contributionTypes}`;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: pr.number,
              body: creditMessage
            });

            console.log(`Posted credit for @${author}: ${contributionTypes}`);
