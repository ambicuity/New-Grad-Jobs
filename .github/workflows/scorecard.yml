name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday at 09:00 UTC — runs after CodeQL to avoid runner contention
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Keep permissions minimal — Scorecard only needs to read the repo and write security events
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Upload SARIF to GitHub Security tab
      id-token: write         # Required for Scorecard's OIDC-based provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false  # Avoid leaking GITHUB_TOKEN to Scorecard subprocess

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # publish_results: true makes the score publicly visible at
          # https://securityscorecards.dev/viewer/?uri=github.com/ambicuity/New-Grad-Jobs
          publish_results: true

      - name: Upload SARIF artifact (7-day retention)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: scorecard-results.sarif
