name: Validate Job Submissions

on:
  pull_request:
    paths:
      - 'config.yml'
      - 'jobs.json'

jobs:
  validate:
    name: Validate Payload Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate config
        run: python test_config.py

      - name: Validate jobs format
        run: |
          python - <<'EOF'
          import json, sys, os
          if os.path.exists("jobs.json"):
              with open("jobs.json") as f:
                  data = json.load(f)
              if not isinstance(data, list):
                  print("Error: jobs.json must be a list")
                  sys.exit(1)
              for job in data:
                  if "title" not in job or "link" not in job or "company" not in job:
                      print("Error: malformed job inside jobs.json")
                      sys.exit(1)
              print(f"✅ jobs.json is valid with {len(data)} items.")
          EOF
