name: Release Please

on:
  push:
    branches: [main]

permissions: read-all
jobs:
  release-please:
    name: Create Release PR
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # --- Everything below this line ONLY runs when a Release is actually published ---
      - name: Checkout code
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign for Keyless Signing
        if: ${{ steps.release.outputs.release_created }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Create Archive, Sign, and Attach to Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          # 1. Generate an archive of the repository state at this release
          ARCHIVE="new-grad-jobs-${TAG}.tar.gz"
          git archive --format=tar.gz -o "$ARCHIVE" HEAD

          # 2. Cryptographically sign the archive using Sigstore (generates .sig file)
          cosign sign-blob --yes --output-signature "${ARCHIVE}.sig" "${ARCHIVE}"

          # 3. Upload the archive and its signature file to the GitHub Release assets
          # This satisfies the OpenSSF 'SignedReleases' check
          gh release upload "${TAG}" "${ARCHIVE}" "${ARCHIVE}.sig"
