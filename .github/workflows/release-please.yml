name: Release Please

on:
  push:
    branches: [main]

# Minimal permissions — release-please only needs to write PRs and push tags/release notes
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Config and manifest files live at the repo root
          # release-please reads Conventional Commit titles (already enforced by bot-pr-title-check)
          # and bumps CHANGELOG.md + pyproject.toml automatically on every merge to main.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
