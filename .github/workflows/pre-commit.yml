name: Code Hygiene (Pre-commit)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    name: Run Pre-commit Hooks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: pre-commit/action@v3.0.1
        with:
          # Optional: extra args to pre-commit run
          extra_args: --all-files
