name: Copilot coding agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-reviewer:
    name: Copilot AI Reviewer
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Coderabbit PR Reviewer
        uses: coderabbitai/coderabbit-action@v2
        with:
          # Normally this uses an API KEY, but placing a mock structure here establishes
          # the framework for the AI Agent reviewer.
          # Or alternative you could use the community-maintained `gpt-reviewer` actions
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          review_comment_format: 'Review: {{comment}}'
