ci-cd:
  - changed-files:
    - any-glob-to-any-file: '.github/workflows/**'
    - any-glob-to-any-file: '.github/actions/**'
    - any-glob-to-any-file: 'Makefile'
    - any-glob-to-any-file: 'pyproject.toml'
    - any-glob-to-any-file: '.pre-commit-config.yaml'

documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'
    - any-glob-to-any-file: 'docs/**'

enhancement:
  - changed-files:
    - any-glob-to-any-file: 'scripts/**'
    - any-glob-to-any-file: 'generate_companies.py'
  - head-branch: ['^feat/', 'feat/']

bug:
  - head-branch: ['^fix/', 'fix/']

config:
  - changed-files:
    - any-glob-to-any-file: 'config.yml'

tests:
  - changed-files:
    - any-glob-to-any-file: 'test_*.py'
    - any-glob-to-any-file: 'tests/**'

chore:
  - head-branch: ['^chore/', 'chore/']

frontend:
  - changed-files:
    - any-glob-to-any-file: 'docs/**/*.js'
    - any-glob-to-any-file: 'docs/**/*.css'
    - any-glob-to-any-file: 'docs/**/*.html'

dependencies:
  - changed-files:
    - any-glob-to-any-file: 'requirements.txt'
    - any-glob-to-any-file: 'pyproject.toml'

beginner:
  - head-branch: ['^beginner/', 'beginner/']

intermediate:
  - head-branch: ['^intermediate/', 'intermediate/']

advanced:
  - head-branch: ['^advanced/', 'advanced/']
