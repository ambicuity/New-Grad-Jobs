name: "🤖 AI-Assisted Task (Recommended)"
description: Open an issue and let our AI architect research the codebase and generate your implementation plan.
title: "[Task]: "
labels: ["plan-me", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome! Our AI will plan this for you. 🚀

        Once you submit this issue, **CodeRabbit** will automatically:
        1. Read our entire codebase (~2,000 lines of Python scraper + 70+ company configs)
        2. Reply within **5–10 minutes** with a step-by-step, agent-ready implementation plan
        3. Remain available for follow-up — just reply with `@coderabbitai clarify <question>`

        You can then hand that plan to Cursor, GitHub Copilot, or your AI tool of choice.

        > [!IMPORTANT]
        > **You must verify AI-generated code before opening a PR.** Our reviewer will
        > cross-reference your PR against this issue's plan. Unverified, untested AI output
        > will be rejected.

  - type: textarea
    id: description
    attributes:
      label: "📋 What needs to be built or fixed?"
      description: |
        Be specific. The more detail you provide, the better CodeRabbit's plan will be.
        Reference specific files, function names, or line numbers if you know them.
      placeholder: |
        e.g. "The `normalize_date_string()` function in `scripts/update_jobs.py` doesn't handle
        timezone-aware datetime objects from the Greenhouse API. When a job's `updated_at` field
        includes a UTC offset (e.g., '2025-01-15T10:30:00+00:00'), the current code raises a
        TypeError during comparison on line 1072."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "🏗️ Which area of the codebase does this affect?"
      options:
        - "🤖 Core scraper (scripts/update_jobs.py)"
        - "⚙️ Configuration (config.yml)"
        - "🌐 Frontend / website (docs/)"
        - "🔁 GitHub Actions / CI-CD (.github/workflows/)"
        - "🧪 Tests (tests/)"
        - "📚 Documentation (docs/wiki/, *.md)"
        - "🏷️ Company data / classification"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: "📊 Estimated difficulty"
      description: Your honest estimate helps us triage and label the issue correctly.
      options:
        - "Beginner (< 50 lines, single function, clear scope)"
        - "Intermediate (50–200 lines, multiple functions, some research required)"
        - "Advanced (200+ lines, architectural impact, deep codebase knowledge needed)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "🔗 Additional context (optional)"
      description: |
        Links to relevant lines of code, related issues, API documentation, or error logs.
      placeholder: |
        - Related issue: #42
        - Relevant function: `is_valid_location()` at update_jobs.py:1079
        - Lever API docs: https://hire.lever.co/developer/postings

  - type: checkboxes
    id: agreements
    attributes:
      label: "✅ Contributor Agreement"
      description: Please confirm before submitting.
      options:
        - label: "I have searched [existing issues](https://github.com/ambicuity/New-Grad-Jobs/issues) and this is not a duplicate."
          required: true
        - label: "I understand CodeRabbit will generate a plan for me, and I can hand it off to AI coding tools."
          required: true
        - label: "I agree to manually verify all AI-generated code, write rigorous tests covering edge cases, and ensure architectural consistency before opening a PR."
          required: true
        - label: "I understand that my PR will be cross-examined against this issue's plan. Incomplete or AI-hallucinated code without tests will be rejected."
          required: true
