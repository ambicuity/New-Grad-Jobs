<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fully automated list of new grad job opportunities from multiple company APIs, updated every 5 minutes. Built by engineers, for engineers.">
  <meta name="keywords" content="new grad jobs, entry level jobs, software engineer jobs, tech jobs, 2025 jobs, 2026 jobs">
  <meta property="og:title" content="NGJ · New Grad Jobs">
  <meta property="og:description" content="Fully automated job board for new graduates powered by multiple live company APIs, updated every 5 minutes.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>NGJ · New Grad Jobs</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://gc.zgo.at" crossorigin>
  <link rel="dns-prefetch" href="https://gc.zgo.at">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="alternate" type="application/rss+xml" title="New Grad Jobs RSS Feed" href="feed.xml">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #e8e8e8;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased; }
    body { overflow-x: auto; }
    * { box-sizing: border-box; }
    #root { height: 100%; width: 100%; min-width: 1180px; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
    input::placeholder { color: #5a5a5a; }
    button:focus-visible, input:focus-visible { outline: 1px solid #ff9d3d; outline-offset: 1px; }
    .ng-boot { padding: 24px; font-size: 12px; color: #ff9d3d; letter-spacing: 0.6px; }
    .ng-boot .dim { color: #6e6e6e; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    window.loadAnalytics = function loadAnalytics() {
      if (window.goatcounter || document.querySelector('script[data-goatcounter]')) return;
      const s = document.createElement('script');
      s.async = true;
      s.dataset.goatcounter = 'https://riteshrana.goatcounter.com/count';
      s.src = 'https://gc.zgo.at/count.js';
      document.head.appendChild(s);
    };
    window.addEventListener('load', () => window.setTimeout(window.loadAnalytics, 3000), { once: true });
  </script>
</head>
<body>
  <div id="root">
    <div class="ng-boot">
      <div>NGJ <span class="dim">loading jobs.json + contributors.json …</span></div>
    </div>
  </div>

  <!-- Pure-JS helper for the LIVE chip, loadable in Node for unit testing. -->
  <script src="terminal/live-stamp-format.js?v=14"></script>

  <!-- Cache-bust the bundle when its shape changes. Bump v= on data-shape edits. -->
  <script type="text/babel" src="terminal/data.jsx?v=14"></script>
  <script type="text/babel" src="terminal/contributors-data.jsx?v=14"></script>
  <script type="text/babel" src="terminal/dashboard.jsx?v=14"></script>
  <script type="text/babel" src="terminal/contributors.jsx?v=14"></script>
  <script type="text/babel" src="terminal/live-stamp.jsx?v=14"></script>
  <script type="text/babel" src="terminal/app.jsx?v=14"></script>

  <script type="text/babel">
    (async () => {
      try {
        await Promise.all([window.NGJOBS_READY, window.NGCONTRIB_READY]);
      } catch (err) {
        console.error('[terminal] data bootstrap failed:', err);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<NGApp />);
    })();
  </script>
</body>
</html>
